<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="一個使用 HTML5 Canvas 製作的現代化復刻版小恐龍遊戲，支援深色模式與觸控操作。">
    <meta name="author" content="GitHub User">
    <title>Dino Run - 現代復刻版</title>
    
    <!-- Open Graph (GitHub 預覽用) -->
    <meta property="og:title" content="Dino Run - 現代復刻版">
    <meta property="og:description" content="經典斷網遊戲的現代化 Web 實現">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg-color: #f7f7f7;
            --text-color: #535353;
            --dino-color: #535353;
            --cactus-color: #2b9348;
            --ground-color: #d3d3d3;
            --accent-color: #ff4757;
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --dino-color: #ffffff;
            --cactus-color: #81c995;
            --ground-color: #3c4043;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease;
            touch-action: manipulation;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 95%;
            max-width: 800px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .scores {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background-color: transparent;
            border-bottom: 2px solid var(--ground-color);
            cursor: pointer;
            border-radius: 4px;
        }

        .ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(var(--bg-color), 0.9);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .ui-overlay.active {
            display: block;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 25px;
            font-size: 0.85rem;
            opacity: 0.6;
            text-align: center;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(var(--text-color), 0.1);
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 15px;
            font-size: 0.8rem;
            border-radius: 20px;
            z-index: 20;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">切換模式</button>

    <div id="game-container">
        <div class="header">
            <div class="scores">
                HI <span id="high-score">00000</span> | <span id="current-score">00000</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="ui-overlay active">
            <h2 id="overlay-title">DINO RUN</h2>
            <p id="overlay-msg">準備好避開障礙物了嗎？</p>
            <button id="start-btn">開始遊戲</button>
        </div>

        <div class="controls-hint">
            [空白鍵] 跳躍 / [點擊螢幕] 開始與操作
        </div>
    </div>

<script>
    /**
     * GitHub 上傳優化版
     */
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("current-score");
    const highDisplay = document.getElementById("high-score");
    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("start-btn");
    const themeToggle = document.getElementById("theme-toggle");

    const BASE_WIDTH = 800;
    const BASE_HEIGHT = 200;
    canvas.width = BASE_WIDTH;
    canvas.height = BASE_HEIGHT;

    let gameState = 'START';
    let score = 0;
    let highScore = localStorage.getItem('dinoHighScore') || 0;
    let gameSpeed = 6;
    let frameCount = 0;
    let colors = {};

    const GRAVITY = 0.6;
    const JUMP_POWER = -12;
    const GROUND_Y = 160;

    // 快取顏色變數，避免動畫迴圈中讀取 DOM
    function updateColors() {
        const style = getComputedStyle(document.documentElement);
        colors = {
            dino: style.getPropertyValue('--dino-color').trim(),
            cactus: style.getPropertyValue('--cactus-color').trim(),
            ground: style.getPropertyValue('--ground-color').trim(),
            bg: style.getPropertyValue('--bg-color').trim()
        };
    }
    updateColors();

    // 音效合成器 (免外部檔案)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        jump: () => playTone(400, 'square', 0.1),
        score: () => playTone(880, 'sine', 0.2),
        die: () => {
            playTone(200, 'sawtooth', 0.1);
            playTone(150, 'sawtooth', 0.2);
        }
    };

    const dino = {
        x: 50,
        y: GROUND_Y,
        width: 40,
        height: 40,
        dy: 0,
        jump() {
            if (this.y === GROUND_Y) {
                this.dy = JUMP_POWER;
                sounds.jump();
            }
        },
        update() {
            this.dy += GRAVITY;
            this.y += this.dy;
            if (this.y > GROUND_Y) {
                this.y = GROUND_Y;
                this.dy = 0;
            }
        },
        draw() {
            ctx.fillStyle = colors.dino;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = colors.bg;
            ctx.fillRect(this.x + 25, this.y + 8, 5, 5);
        }
    };

    let obstacles = [];

    class Obstacle {
        constructor() {
            this.width = 15 + Math.random() * 25;
            this.height = 30 + Math.random() * 35;
            this.x = BASE_WIDTH;
            this.y = GROUND_Y + 40 - this.height;
        }
        update() {
            this.x -= gameSpeed;
        }
        draw() {
            ctx.fillStyle = colors.cactus;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }

    function updateScoreDisplay() {
        const s = Math.floor(score).toString().padStart(5, '0');
        const h = Math.floor(highScore).toString().padStart(5, '0');
        scoreDisplay.textContent = s;
        highDisplay.textContent = h;
    }

    function checkCollision(a, b) {
        // 稍微縮減碰撞判定範圍 (Hitbox) 讓遊戲體驗更好
        const padding = 5;
        return a.x + padding < b.x + b.width &&
               a.x + a.width - padding > b.x &&
               a.y + padding < b.y + b.height &&
               a.y + a.height - padding > b.y;
    }

    function gameLoop() {
        if (gameState !== 'PLAYING') return;

        ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        
        // 繪製地平線
        ctx.strokeStyle = colors.ground;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y + 40);
        ctx.lineTo(BASE_WIDTH, GROUND_Y + 40);
        ctx.stroke();

        dino.update();
        dino.draw();

        score += 0.15;
        if (Math.floor(score) > 0 && Math.floor(score) % 100 === 0 && (score % 0.15 < 0.1)) {
            sounds.score();
            gameSpeed += 0.1;
        }
        updateScoreDisplay();

        frameCount++;
        if (frameCount % Math.floor(120 / (gameSpeed/5)) === 0) {
            obstacles.push(new Obstacle());
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();

            if (checkCollision(dino, obstacles[i])) {
                endGame();
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        gameState = 'PLAYING';
        score = 0;
        gameSpeed = 6;
        obstacles = [];
        frameCount = 0;
        overlay.classList.remove('active');
        gameLoop();
    }

    function endGame() {
        gameState = 'GAMEOVER';
        sounds.die();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('dinoHighScore', highScore);
        }
        document.getElementById('overlay-title').textContent = "GAME OVER";
        document.getElementById('overlay-msg').textContent = `得分: ${Math.floor(score)}`;
        startBtn.textContent = "再試一次";
        overlay.classList.add('active');
    }

    const handleInput = (e) => {
        if (e.code === 'Space' || e.type === 'touchstart') {
            if (gameState === 'PLAYING') {
                dino.jump();
            } else if (gameState !== 'PLAYING') {
                if (e.target !== themeToggle) startGame();
            }
            if (e.type === 'touchstart' && gameState === 'PLAYING') e.preventDefault();
        }
    };

    window.addEventListener('keydown', handleInput);
    canvas.addEventListener('touchstart', handleInput, { passive: false });
    startBtn.addEventListener('click', startGame);

    themeToggle.addEventListener('click', () => {
        if (document.body.hasAttribute('data-theme')) {
            document.body.removeAttribute('data-theme');
        } else {
            document.body.setAttribute('data-theme', 'dark');
        }
        updateColors();
    });

    updateScoreDisplay();
</script>
</body>
</html>
